version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: forensictracefund-db
    environment:
      POSTGRES_USER: forensic
      POSTGRES_PASSWORD: tracefund_dev_password
      POSTGRES_DB: forensictracefund
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forensic"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forensictracefund-api
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://forensic:tracefund_dev_password@postgres:5432/forensictracefund
      JWT_SECRET: dev_jwt_secret_key_change_in_production
      JWT_EXPIRY: 7d
      CORS_ORIGIN: http://localhost:3000
      LOG_LEVEL: debug
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: forensictracefund-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: forensictracefund-network