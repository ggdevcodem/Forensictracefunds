version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: forensictracefund-db-prod
    environment:
      POSTGRES_USER: ${DB_USER:-forensic}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: forensictracefund
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-forensic}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - forensictracefund-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forensictracefund-api-prod
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER:-forensic}:${DB_PASSWORD}@postgres:5432/forensictracefund
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: 7d
      CORS_ORIGIN: ${CORS_ORIGIN}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL}
      LOG_LEVEL: info
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - forensictracefund-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: forensictracefund-web-prod
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - forensictracefund-network

volumes:
  postgres_data_prod:
    driver: local

networks:
  forensictracefund-network:
    driver: bridge
